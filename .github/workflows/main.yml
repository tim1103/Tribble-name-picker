name: Build and Release

on:
  push:
    tags:
      - '*'  # 监听所有新tag的推送

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整的git历史记录（包含tag信息）

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x

    - name: Install project dependencies
      run: npm install

    - name: Build Windows x64, arm64
      run: npm run dist -- --win --x64 --arm64
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-builds
        path: dist/

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整的git历史记录（包含tag信息）

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x

    - name: Install Linux dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fakeroot dpkg binfmt-support

    - name: Install project dependencies
      run: npm install

    - name: Build Linux x64, arm64 (deb and AppImage)
      run: npm run dist -- --linux --x64 --arm64
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-builds
        path: dist/

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Prepare release assets
      run: |
        mkdir -p dist
        # 从各个构建目录复制文件到统一的 dist 目录
        find ./artifacts -name "*.exe" -exec cp {} ./dist/ \;
        find ./artifacts -name "*.msi" -exec cp {} ./dist/ \;
        find ./artifacts -name "*.portable.exe" -exec cp {} ./dist/ \;
        find ./artifacts -name "*.deb" -exec cp {} ./dist/ \;
        find ./artifacts -name "*.AppImage" -exec cp {} ./dist/ \;

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}  # 使用推送的tag名称
        name: Release ${{ github.ref_name }}
        body: |  # 可自定义Release描述
          Auto-generated release for tag ${{ github.ref_name }}
          Build artifacts:
          - Windows: x64, arm64 (NSIS installer and portable)
          - Linux: x64, arm64 (deb and AppImage)
        files: |
          dist/*.deb
          dist/*.AppImage
          dist/*.exe
          dist/*.msi
          dist/*.portable.exe